<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFlow - Cadastro de Operador</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 20px;">
    <div class="card p-4 shadow-lg" style="width: 450px;">
        <h3 class="text-center text-primary fw-bold mb-3">Novo Operador</h3>
        
        {% if erro %}
            <div class="alert alert-danger py-2 text-center small">{{ erro }}</div>
        {% endif %}
        {% if sucesso %}
            <div class="alert alert-success py-2 text-center small">{{ sucesso }}</div>
        {% endif %}

        <form action="/cadastro" method="POST">
            <div class="mb-2">
                <label class="form-label small fw-bold">Nome Completo</label>
                <input type="text" name="nome" class="form-control" required placeholder="Ex: Fabio Ramos">
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">Data de Nascimento</label>
                <input type="date" name="data_nascimento" class="form-control" required>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">E-mail Corporativo</label>
                <input type="email" name="email" class="form-control" required placeholder="fabio.ramos@gmail.com">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Senha de Acesso</label>
                <input type="password" name="password" class="form-control" required placeholder="Crie uma senha segura">
            </div>
            <button type="submit" class="btn btn-primary w-100">Finalizar Cadastro</button>
        </form>
        <div class="text-center mt-3">
            <a href="/login" class="small text-decoration-none">Já tem conta? Voltar para o Login</a>
        </div>
    </div>
</body>
</html>
